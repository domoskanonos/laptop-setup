---
- name: Ensure git user.name is set
  become: false
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ git_user_name }}"

- name: Ensure git user.email is set
  become: false
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ git_user_email }}"
