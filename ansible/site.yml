---
- name: Configure local Ubuntu workstation
  hosts: localhost
  gather_facts: true
  become: true

  pre_tasks:
    - name: Validate Ubuntu family
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "Debian"
        fail_msg: "This playbook supports Ubuntu/Debian only."

  roles:
    - role: base
    - role: ssh
    - role: git
    - role: ollama
